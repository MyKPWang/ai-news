<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; line-height: 1.6; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { text-align: center; padding: 20px 0; border-bottom: 3px solid #1890ff; margin-bottom: 20px; }
        .hot { background: #fff5f5; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .hot h2 { color: #ff4d4f; margin-bottom: 15px; }
        .hot ul { list-style: none; }
        .hot li { margin: 8px 0; padding-left: 20px; position: relative; }
        .hot li:before { content: '🔥'; position: absolute; left: 0; }
        .section { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .section h2 { color: #1890ff; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
        .item { margin-bottom: 20px; }
        .item h3 { color: #333; margin-bottom: 8px; }
        .item .desc { color: #666; margin-bottom: 8px; }
        .item .meta { color: #999; font-size: 12px; }
        .item .meta a { color: #1890ff; text-decoration: none; }
        .insight { background: #f6ffed; padding: 20px; border-radius: 8px; margin-top: 20px; }
        .insight h2 { color: #52c41a; margin-bottom: 15px; }
        .footer { text-align: center; color: #999; padding: 20px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📡 {{title}}</h1>
        
        <div class="hot">
            <h2>🔥 今日热点</h2>
            <ul>
{{hot_items}}
            </ul>
        </div>

{{sections}}

{{insight}}

        <div class="footer">
            <p>来源：虎嗅、36氪、InfoQ、The Verge、Wired | 整理：卧龙</p>
        </div>
    </div>
</body>
</html>
