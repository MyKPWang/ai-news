<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{title}}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      background: #ffffff;
      color: #333;
      line-height: 1.8;
      padding: 16px;
      font-size: 16px;
    }
    .container { max-width: 600px; margin: 0 auto; }
    
    .header { padding: 24px 20px; background: #fff; border-radius: 12px 12px 0 0; }
    .header h1 { font-size: 28px; font-weight: 700; color: #1a1a1a; }
    .header .date { font-size: 15px; color: #999; margin-top: 6px; }
    
    .hot-box { background: #fff; padding: 20px; border-radius: 12px; margin-bottom: 16px; border: 1px solid #e8e8e8; }
    .hot-box .title { font-size: 18px; font-weight: 700; color: #e74c3c; margin-bottom: 14px; }
    .hot-box .item { padding: 12px 0; border-bottom: 1px solid #f0f0f0; font-size: 16px; }
    .hot-box .item:last-child { border-bottom: none; }
    
    .sec { margin-bottom: 16px; }
    .sec-title { 
      font-size: 18px; 
      font-weight: 600; 
      color: #1a1a1a; 
      padding: 16px 20px; 
      background: #fff; 
      border-radius: 12px 12px 0 0;
      display: flex;
      align-items: center;
    }
    .sec-title::before { content: ""; width: 4px; height: 20px; background: #ff6b6b; margin-right: 12px; border-radius: 2px; }
    .sec-title.blue::before { background: #4299e1; }
    .sec-title.green::before { background: #48bb78; }
    .sec-title.purple::before { background: #9f7aea; }
    .sec-title.orange::before { background: #ed8936; }
    
    .sec-list { background: #fff; border-radius: 0 0 12px 12px; padding: 8px 0; }
    .sec-list .item { padding: 16px 20px; border-bottom: 1px solid #f5f5f5; }
    .sec-list .item:last-child { border-bottom: none; }
    .sec-list .title { font-size: 17px; font-weight: 600; color: #0052d9; margin-bottom: 6px; }
    .sec-list .desc { font-size: 15px; color: #666; margin-bottom: 8px; line-height: 1.8; }
    .sec-list .meta { font-size: 14px; color: #999; }
    .sec-list .link { font-size: 14px; color: #0052d9; margin-top: 6px; }
    .sec-list .link a { color: #0052d9; text-decoration: none; }
    
    .footer { text-align: center; padding: 24px; color: #bbb; font-size: 14px; }
    
    .insight { background: linear-gradient(135deg, #3498db, #1a5276); border-radius: 12px; padding: 20px; margin-top: 20px; color: #fff; }
    .insight .title { font-size: 16px; font-weight: 700; margin-bottom: 12px; }
    .insight .content { font-size: 15px; line-height: 1.9; opacity: 0.95; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🤖 {{title}}</h1>
      <div class="date">{{date}}</div>
    </div>
    
    {{hot_items}}
    
    {{sections}}
    
    {{insight}}
    
    <div class="footer">{{footer}}</div>
  </div>
</body>
</html>
