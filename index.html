<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI行业资讯</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      background: #ffffff;
      color: #333;
      line-height: 1.6;
      padding: 12px;
    }
    .container { max-width: 600px; margin: 0 auto; }
    
    /* 头部 */
    .header { padding: 20px 16px; background: #fff; border-radius: 12px 12px 0 0; }
    .header h1 { font-size: 24px; font-weight: 700; color: #1a1a1a; }
    .header .date { font-size: 13px; color: #999; margin-top: 4px; }
    
    /* 今日热点 */
    .hot-box { background: linear-gradient(135deg, #ff6b6b, #ee5a5a); padding: 16px; border-radius: 0 0 12px 12px; margin-bottom: 12px; }
    .hot-box .title { font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 12px; }
    .hot-box .item { display: flex; align-items: flex-start; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.2); }
    .hot-box .item:last-child { border-bottom: none; }
    .hot-box .num { 
      width: 20px; 
      height: 20px; 
      background: rgba(255,255,255,0.25); 
      border-radius: 50%; 
      display: flex; 
      align-items: center; 
      justify-content: center;
      font-size: 12px; 
      font-weight: 700; 
      color: #fff; 
      margin-right: 10px; 
      flex-shrink: 0;
    }
    .hot-box .text { color: #fff; font-size: 14px; }
    
    /* 分类 */
    .sec { margin-bottom: 12px; }
    .sec-title { 
      font-size: 15px; 
      font-weight: 600; 
      color: #1a1a1a; 
      padding: 12px 16px; 
      background: #fff; 
      border-radius: 12px 12px 0 0;
      display: flex;
      align-items: center;
    }
    .sec-title::before { content: ""; width: 3px; height: 16px; background: #ff6b6b; margin-right: 10px; border-radius: 2px; }
    .sec-title.blue::before { background: #4299e1; }
    .sec-title.orange::before { background: #ed8936; }
    
    .sec-list { background: #fff; border-radius: 0 0 12px 12px; padding: 4px 0; }
    .sec-list .item { padding: 12px 16px; border-bottom: 1px solid #f5f5f5; }
    .sec-list .item:last-child { border-bottom: none; }
    .sec-list .title { font-size: 14px; font-weight: 500; color: #333; }
    .sec-list .meta { font-size: 12px; color: #999; margin-top: 4px; }
    
    /* 底部 */
    .footer { text-align: center; padding: 20px; color: #bbb; font-size: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🤖 AI行业资讯</h1>
      <div class="date">2026年3月21日 周五</div>
    </div>
    
    <div class="hot-box">
      <div class="title">📌 今日热点</div>
      <div class="item"><span class="num">1</span><span class="text">马斯克确认Cursor基于Kimi K2.5微调</span></div>
      <div class="item"><span class="num">2</span><span class="text">微软大刀阔斧重组AI部门</span></div>
      <div class="item"><span class="num">3</span><span class="text">章鱼动力获近5000万美元融资</span></div>
    </div>
    
    <div class="sec">
      <div class="sec-title">🏷️ 国内AI</div>
      <div class="sec-list">
        <div class="item"><div class="title">腾讯走到命运拐点了</div><div class="meta">来源：虎嗅</div></div>
        <div class="item"><div class="title">地平线争做"英伟达平替"</div><div class="meta">来源：36氪</div></div>
      </div>
    </div>
    
    <div class="sec">
      <div class="sec-title blue">🌍 国外AI</div>
      <div class="sec-list">
        <div class="item"><div class="title">Meta AI审核系统将取代外包人员</div><div class="meta">来源：The Verge</div></div>
        <div class="item"><div class="title">Samsung计划730亿美元扩张AI芯片</div><div class="meta">来源：Wired</div></div>
      </div>
    </div>
    
    <div class="footer">来源：虎嗅、36氪、机器之心、The Verge、Wired</div>
  </div>
</body>
</html>
