<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI行业资讯</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      background: #f5f5f5;
      color: #333;
      line-height: 1.6;
      padding: 16px;
    }
    .container { max-width: 640px; margin: 0 auto; }
    
    /* 顶部 */
    .header { margin-bottom: 16px; }
    .header h1 { font-size: 20px; font-weight: 700; color: #1a1a1a; }
    .header .date { font-size: 13px; color: #999; margin-top: 2px; }
    
    /* 今日热点 */
    .hot-section { 
      background: #fff;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 16px;
    }
    .hot-section .section-title { 
      font-size: 15px; 
      font-weight: 700; 
      margin-bottom: 12px;
      color: #e74c3c;
    }
    .hot-section .news-item {
      padding: 10px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 14px;
      display: flex;
      gap: 10px;
    }
    .hot-section .news-item:last-child { border-bottom: none; }
    .hot-section .num { 
      color: #e74c3c; 
      font-weight: 700;
      min-width: 20px;
    }
    .hot-section .news-title { color: #333; }
    
    /* 分类 */
    .category { 
      font-size: 16px; 
      font-weight: 600; 
      margin: 20px 0 10px 0; 
      padding-left: 10px;
      border-left: 3px solid #e74c3c;
      color: #1a1a1a;
    }
    .category.blue { border-left-color: #3498db; }
    .category.orange { border-left-color: #f39c12; }
    
    /* 列表项 */
    .list-item {
      background: #fff;
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 8px;
    }
    .list-item .title { font-size: 14px; font-weight: 500; color: #1a1a1a; }
    .list-item .meta { font-size: 12px; color: #999; margin-top: 4px; }
    
    /* 来源 */
    .sources { 
      text-align: center; 
      color: #999; 
      font-size: 12px; 
      padding: 20px; 
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>AI行业资讯</h1>
      <div class="date">2026年3月21日 周五</div>
    </div>

    <!-- 今日热点 -->
    <div class="hot-section">
      <div class="section-title">今日热点</div>
      <div class="news-item"><span class="num">1</span><span class="news-title">马斯克确认Cursor基于Kimi K2.5微调</span></div>
      <div class="news-item"><span class="num">2</span><span class="news-title">微软大刀阔斧重组AI部门</span></div>
      <div class="news-item"><span class="num">3</span><span class="news-title">章鱼动力获近5000万美元融资</span></div>
    </div>

    <!-- 国内AI -->
    <div class="category">🏷️ 国内AI</div>
    <div class="list-item"><div class="title">腾讯走到命运拐点了</div><div class="meta">来源：虎嗅</div></div>
    <div class="list-item"><div class="title">地平线争做"英伟达平替"</div><div class="meta">来源：36氪</div></div>

    <!-- 国外AI -->
    <div class="category blue">🌍 国外AI</div>
    <div class="list-item"><div class="title">Meta AI审核系统将取代外包人员</div><div class="meta">来源：The Verge</div></div>
    <div class="list-item"><div class="title">Samsung计划730亿美元扩张AI芯片</div><div class="meta">来源：Wired</div></div>

    <div class="sources">来源：虎嗅、36氪、机器之心、The Verge、Wired 等</div>
  </div>
</body>
</html>
